name: Daily Scryfall Sync

on:
  schedule:
    # This runs at 00:00 UTC every single day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # This adds a "Run Workflow" button in the GitHub UI for manual testing

jobs:
  import_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install
        working-directory: workers

      - name: Run Scryfall Script
        run: npm run import-scryfall
        working-directory: workers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DRY_RUN: false
